<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Received — Aman Audio</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .thankyou-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      background: var(--bg);
    }
    .thankyou-box {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .thankyou-logo {
      height: 52px;
      width: auto;
      margin: 0 auto 2rem;
    }
    .thankyou-rule {
      width: 48px;
      height: 1px;
      background: var(--accent-dim);
      margin: 1.5rem auto;
    }
    .thankyou-heading {
      font-family: var(--font-heading);
      font-size: clamp(2.5rem, 6vw, 4rem);
      color: var(--text);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .thankyou-body {
      color: var(--text-mid);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }
    .thankyou-meta {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-top: 2rem;
    }
    .thankyou-meta a {
      color: var(--accent-dim);
      transition: color 200ms ease;
    }
    .thankyou-meta a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="thankyou-wrap">
    <div class="thankyou-box">
      <img src="logo-bw.png" alt="Aman Audio" class="thankyou-logo" />
      <div class="thankyou-rule"></div>
      <h1 class="thankyou-heading">Message Received</h1>
      <p class="thankyou-body">
        Thanks for reaching out. I'll review your message and get back to you
        within a day or two — usually sooner. If it's urgent, feel free to call directly.
      </p>
      <a href="/" class="btn btn-primary">Back to Home</a>
      <p class="thankyou-meta">
        Questions? <a href="tel:+15857756757">(585) 775-6757</a>
        &nbsp;·&nbsp;
        <a href="mailto:jude.aman123@gmail.com">jude.aman123@gmail.com</a>
      </p>
    </div>
  </div>
</body>
</html>
