<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parts Compendium — Aman Audio</title>
  <meta name="description" content="Bench reference for common hardware and electronic components used in guitar amp repair, pedal builds, and vintage electronics restoration. Aman Audio — Canandaigua, NY." />

  <link rel="canonical" href="https://amanaudio.com/parts.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Page hero ── */
    .parts-hero {
      background: var(--brown-dark);
      border-bottom: 6px solid var(--brown);
      padding: 4.5rem 1.5rem 3.5rem;
    }

    .parts-hero-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .parts-hero-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 0.75rem;
    }

    .parts-hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      color: var(--cream);
      line-height: 0.92;
    }

    .parts-hero-meta {
      text-align: right;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--cream);
      opacity: 0.45;
      line-height: 1.8;
      flex-shrink: 0;
    }

    .parts-hero-meta strong {
      display: block;
      color: var(--amber);
      opacity: 1;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Main body ── */
    .parts-body {
      background: var(--cream);
      padding: 4rem 0 5rem;
      border-bottom: 4px solid var(--cream-dark);
    }

    /* ── Controls ── */
    .parts-controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .parts-search {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text-dark);
      background: #fff;
      border: 2px solid var(--cream-dark);
      border-radius: 2px;
      outline: none;
      transition: border-color var(--transition);
    }

    .parts-search:focus {
      border-color: var(--brown);
    }

    .parts-search::placeholder {
      color: var(--text-mid);
      opacity: 0.6;
    }

    .cat-filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .cat-btn {
      padding: 0.55rem 1rem;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-mid);
      background: transparent;
      border: 2px solid var(--cream-dark);
      border-radius: 2px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .cat-btn:hover {
      border-color: var(--brown);
      color: var(--brown);
    }

    .cat-btn.active {
      background: var(--brown-dark);
      border-color: var(--brown-dark);
      color: var(--cream);
    }

    /* ── Count line ── */
    .parts-count {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .parts-count::after {
      content: '';
      flex: 1;
      height: 2px;
      background: var(--brown);
      opacity: 0.2;
    }

    /* ── Parts list ── */
    .parts-list {
      display: flex;
      flex-direction: column;
    }

    .part-row {
      border-bottom: 1px solid var(--cream-dark);
    }

    .part-row:last-child {
      border-bottom: none;
    }

    .part-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
    }

    .part-trigger:hover .part-trigger-name {
      color: var(--brown);
    }

    .part-trigger-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .part-trigger-name {
      font-size: 0.97rem;
      font-weight: 500;
      color: var(--text-dark);
      transition: color var(--transition);
    }

    .part-badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 2px;
      white-space: nowrap;
    }

    .part-badge-cat {
      color: var(--brown-light);
      background: var(--cream-dark);
    }

    .part-badge-type {
      color: var(--blue-dark);
      background: #dce8f0;
    }

    .part-chevron {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      color: var(--brown-light);
      transition: transform var(--transition);
    }

    .part-row.open .part-chevron {
      transform: rotate(180deg);
    }

    /* ── Part detail ── */
    .part-detail {
      display: none;
      padding: 0 0 1.5rem;
    }

    .part-row.open .part-detail {
      display: block;
    }

    .part-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 2rem;
      margin-bottom: 1rem;
    }

    .part-detail-field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 0.25rem;
    }

    .part-detail-field p {
      font-size: 0.88rem;
      color: var(--text-dark);
      line-height: 1.55;
    }

    .part-detail-field.full {
      grid-column: 1 / -1;
    }

    /* ── Tags ── */
    .part-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .part-tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 7px;
      background: #dce8f0;
      color: var(--blue-dark);
      border-radius: 2px;
    }

    /* ── Vendors ── */
    .part-vendors-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 0.5rem;
    }

    .part-vendors-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .part-vendor {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.55rem 0.85rem;
      background: #fff;
      border: 1px solid var(--cream-dark);
      border-radius: 2px;
      font-size: 0.83rem;
    }

    .part-vendor-name {
      font-weight: 600;
      color: var(--brown);
      text-decoration: none;
      transition: color var(--transition);
    }

    .part-vendor-name:hover {
      color: var(--amber);
    }

    .part-vendor-pn {
      color: var(--text-mid);
      font-size: 0.78rem;
    }

    .part-vendor-price {
      font-weight: 600;
      color: #2a7a3a;
    }

    .part-vendor-notes {
      color: var(--text-mid);
      font-size: 0.78rem;
      font-style: italic;
    }

    /* ── Notes box ── */
    .part-notes-box {
      margin-top: 0.75rem;
      padding: 0.7rem 1rem;
      background: var(--brown-dark);
      border-left: 3px solid var(--amber);
      font-size: 0.85rem;
      color: var(--cream);
      line-height: 1.55;
    }

    /* ── Empty state ── */
    .parts-empty {
      padding: 3rem 0;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-mid);
    }

    /* ── Animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .part-row {
      animation: fadeUp 0.25s ease both;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .parts-hero-meta { text-align: left; }

      .part-detail-grid {
        grid-template-columns: 1fr;
      }

      .part-detail-field.full {
        grid-column: 1;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER / NAV -->
  <header class="site-header" id="top">
    <nav class="nav-inner">
      <a href="/" class="logo"><img src="logo-bw.png" alt="Aman Audio" class="logo-img" /></a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/about.html">About</a></li>
        <li><a href="/services.html">Services</a></li>
        <li><a href="/parts.html" aria-current="page">Parts</a></li>
        <li><a href="/#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- HERO -->
    <section class="parts-hero">
      <div class="parts-hero-inner">
        <div>
          <p class="parts-hero-label">Aman Audio &nbsp;·&nbsp; Bench Reference</p>
          <h1>Parts<br>Compendium.</h1>
        </div>
        <div class="parts-hero-meta">
          <strong>Bench Reference</strong>
          Hardware &amp; electronic components<br>
          Common repairs &amp; pedal builds
        </div>
      </div>
    </section>

    <!-- PARTS CONTENT -->
    <section class="parts-body">
      <div class="container">

        <!-- Controls -->
        <div class="parts-controls">
          <input
            type="search"
            id="parts-search"
            class="parts-search"
            placeholder="Search by part, spec, application, or tag…"
            autocomplete="off"
          />
          <div class="cat-filters" id="cat-filters">
            <button class="cat-btn active" data-cat="All">All</button>
            <button class="cat-btn" data-cat="Hardware">Hardware</button>
            <button class="cat-btn" data-cat="Electronic Component">Electronic</button>
            <button class="cat-btn" data-cat="Enclosure">Enclosure</button>
            <button class="cat-btn" data-cat="Cabinet & Covering">Cabinet</button>
            <button class="cat-btn" data-cat="Peavey">Peavey</button>
            <button class="cat-btn" data-cat="Mesa Boogie">Mesa Boogie</button>
          </div>
        </div>

        <!-- Count -->
        <div class="parts-count" id="parts-count"></div>

        <!-- List -->
        <div class="parts-list" id="parts-list"></div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <a href="/" class="logo">
            <img src="logo-bw.png" alt="Aman Audio" class="logo-img footer-logo-img" />
          </a>
          <p class="footer-tagline">From bench to stage — done right.</p>
        </div>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="/about.html">About</a>
          <a href="/services.html">Services</a>
          <a href="/parts.html">Parts</a>
          <a href="/#contact">Contact</a>
        </nav>
      </div>
      <p class="footer-copy">&copy; 2026 Aman Audio. All rights reserved.</p>
    </div>
  </footer>

  <script src="main.js"></script>
  <script src="parts-data.js"></script>
  <script>
    (function () {
      const listEl    = document.getElementById('parts-list');
      const countEl   = document.getElementById('parts-count');
      const searchEl  = document.getElementById('parts-search');
      const filterEl  = document.getElementById('cat-filters');

      let activeCat   = 'All';
      let searchQuery = '';
      let openId      = null;

      function getFiltered() {
        const q = searchQuery.toLowerCase().trim();
        return PARTS_DATA.filter(p => {
          if (activeCat !== 'All' && p.category !== activeCat) return false;
          if (!q) return true;
          return (
            p.name.toLowerCase().includes(q) ||
            p.partType.toLowerCase().includes(q) ||
            p.specs.toLowerCase().includes(q) ||
            p.application.toLowerCase().includes(q) ||
            (p.notes || '').toLowerCase().includes(q) ||
            (p.tags || []).some(t => t.toLowerCase().includes(q))
          );
        });
      }

      function renderVendors(vendors) {
        if (!vendors || vendors.length === 0) return '';
        return `
          <div class="part-vendors-label">Where to buy</div>
          <div class="part-vendors-list">
            ${vendors.map(v => `
              <div class="part-vendor">
                <a class="part-vendor-name" href="${v.url}" target="_blank" rel="noopener noreferrer">${v.name}</a>
                ${v.partNumber ? `<span class="part-vendor-pn">#${v.partNumber}</span>` : ''}
                ${v.price != null ? `<span class="part-vendor-price">$${v.price.toFixed(2)}</span>` : ''}
                ${v.notes ? `<span class="part-vendor-notes">— ${v.notes}</span>` : ''}
              </div>
            `).join('')}
          </div>
        `;
      }

      function renderPart(p, index) {
        const isOpen = openId === p.id;
        const delay  = Math.min(index * 0.04, 0.4);
        return `
          <div class="part-row${isOpen ? ' open' : ''}" data-id="${p.id}" style="animation-delay:${delay}s">
            <button class="part-trigger" aria-expanded="${isOpen}">
              <span class="part-trigger-left">
                <span class="part-trigger-name">${p.name}</span>
                <span class="part-badge part-badge-cat">${p.category}</span>
                <span class="part-badge part-badge-type">${p.partType}</span>
              </span>
              <svg class="part-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 6 8 10 12 6"></polyline>
              </svg>
            </button>
            <div class="part-detail">
              <div class="part-detail-grid">
                <div class="part-detail-field full">
                  <label>Specs</label>
                  <p>${p.specs}</p>
                </div>
                <div class="part-detail-field full">
                  <label>Application</label>
                  <p>${p.application}</p>
                </div>
              </div>
              ${p.tags && p.tags.length ? `
                <div class="part-tags">
                  ${p.tags.map(t => `<span class="part-tag">${t}</span>`).join('')}
                </div>
              ` : ''}
              ${renderVendors(p.vendors)}
              ${p.notes ? `<div class="part-notes-box">${p.notes}</div>` : ''}
            </div>
          </div>
        `;
      }

      function render() {
        const filtered = getFiltered();
        const word = filtered.length === 1 ? 'part' : 'parts';
        countEl.textContent = `${filtered.length} ${word}`;

        if (filtered.length === 0) {
          listEl.innerHTML = `<div class="parts-empty">No parts found${searchQuery ? ` matching &ldquo;${searchQuery}&rdquo;` : ''}.</div>`;
          return;
        }

        listEl.innerHTML = filtered.map((p, i) => renderPart(p, i)).join('');

        listEl.querySelectorAll('.part-trigger').forEach(btn => {
          btn.addEventListener('click', () => {
            const row = btn.closest('.part-row');
            const id  = row.dataset.id;
            openId = openId === id ? null : id;
            render();
            if (openId) {
              // small scroll nudge so the detail is visible
              setTimeout(() => {
                const opened = listEl.querySelector('.part-row.open');
                if (opened) opened.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              }, 50);
            }
          });
        });
      }

      searchEl.addEventListener('input', () => {
        searchQuery = searchEl.value;
        render();
      });

      filterEl.addEventListener('click', e => {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;
        activeCat = btn.dataset.cat;
        filterEl.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
        render();
      });

      render();
    })();
  </script>
</body>
</html>
